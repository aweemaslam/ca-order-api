spring:
  application:
    name: ca-orders-api
  datasource:
    url: jdbc:h2:mem:ca_order_api_test_${random.uuid};MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_ON_EXIT=FALSE;INIT=CREATE SCHEMA IF NOT EXISTS ca_order_api_test
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      schema: ca_order_api_test
      maximum-pool-size: 5
      minimum-idle: 1
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.batch_size: 50
        order_inserts: true
        order_updates: true
  liquibase:
    change-log: classpath:db/changelog/main-changelog.xml
    default-schema: ca_order_api_test
    liquibase-schema: ca_order_api_test
    enabled: true
  task:
    scheduling:
      enabled: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:dummy:9092}
    topic:
      order-event: order-events
    listener:
      auto-startup: false

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        acks: all
        enable.idempotence: true
        retries: 5

    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:
        spring.json.trusted.packages: com.caorderapi.kafka.model
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.caorderapi.kafka.model.OrderEvent

logging:
  level:
    com.ca.orderapi: INFO
    org.hibernate.SQL: DEBUG

app:
  payment:
    base-url: http://localhost:8089
  fulfillment:
    base-url: http://localhost:8090
  orders:
    initial-status: PENDING
    pay-target-status: PAID
    fulfill-target-status: FULFILLED
    CANCELLED-status: CANCELLED
    reservation-ttl-minutes: 15
  orderItems:
    initial-status: PENDING
    pay-target-status: CONFIRMED
    fulfill-target-status: FULFILLED
    CANCELLED-status: CANCELLED

